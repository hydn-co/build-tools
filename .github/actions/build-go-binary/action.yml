name: "Build Go Binary"
description: "Builds a Go binary for a target GOOS and GOARCH"

inputs:
  binary-prefix:
    description: "Prefix for the output filename, including any trailing separator"
    required: true
  goos:
    description: "Target operating system"
    required: true
  goarch:
    description: "Target architecture"
    required: true
  build-target:
    description: "Go package or module target to build"
    required: false
    default: "./cmd"
  build-flags:
    description: "Optional additional flags passed to go build"
    required: false
    default: ""
  cgo-enabled:
    description: "Value for CGO_ENABLED during build"
    required: false
    default: "0"
  output-directory:
    description: "Directory where the built binary should be written"
    required: false
    default: "."
  working-directory:
    description: "Directory to run go build from"
    required: false
    default: "."

outputs:
  filename:
    description: "Name of the built binary"
    value: ${{ steps.build.outputs.filename }}
  path:
    description: "Absolute path to the built binary"
    value: ${{ steps.build.outputs.path }}

runs:
  using: "composite"
  steps:
  - name: Build binary
    id: build
    shell: bash
    env:
      BINARY_PREFIX: ${{ inputs.binary-prefix }}
      GOOS_VALUE: ${{ inputs.goos }}
      GOARCH_VALUE: ${{ inputs.goarch }}
      BUILD_TARGET: ${{ inputs.build-target }}
      BUILD_FLAGS: ${{ inputs.build-flags }}
      CGO_ENABLED_VALUE: ${{ inputs.cgo-enabled }}
      OUTPUT_DIRECTORY: ${{ inputs.output-directory }}
      WORKING_DIRECTORY: ${{ inputs.working-directory }}
    run: |
      set -euo pipefail

      FILENAME="${BINARY_PREFIX}${GOOS_VALUE}-${GOARCH_VALUE}"
      if [[ "$GOOS_VALUE" == "windows" ]]; then
        FILENAME="${FILENAME}.exe"
      fi

      if [[ "$OUTPUT_DIRECTORY" = /* ]]; then
        OUTPUT_ROOT="$OUTPUT_DIRECTORY"
      else
        OUTPUT_ROOT="$GITHUB_WORKSPACE/$OUTPUT_DIRECTORY"
      fi

      if [[ "$WORKING_DIRECTORY" = /* ]]; then
        WORK_ROOT="$WORKING_DIRECTORY"
      else
        WORK_ROOT="$GITHUB_WORKSPACE/$WORKING_DIRECTORY"
      fi

      mkdir -p "$OUTPUT_ROOT"
      OUTPUT_PATH="$OUTPUT_ROOT/$FILENAME"

      BUILD_ARGS=()
      if [[ -n "$BUILD_FLAGS" ]]; then
        read -r -a BUILD_ARGS <<< "$BUILD_FLAGS"
      fi

      pushd "$WORK_ROOT" >/dev/null
      GOOS="$GOOS_VALUE" GOARCH="$GOARCH_VALUE" CGO_ENABLED="$CGO_ENABLED_VALUE" \
        go build "${BUILD_ARGS[@]}" -o "$OUTPUT_PATH" "$BUILD_TARGET"
      popd >/dev/null

      echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
      echo "path=$OUTPUT_PATH" >> "$GITHUB_OUTPUT"
