name: Guard connector release branch
description: >-
  Fails unless the workflow ref is the repository default branch or a develop-style branch
  (dev, develop, development). Matches collector/connector release guard behavior.

runs:
  using: composite
  steps:
    - name: Guard release branch
      shell: bash
      run: |
        set -euo pipefail
        REF_NAME="${{ github.ref_name }}"
        DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

        if [[ -z "$DEFAULT_BRANCH" ]]; then
          echo "::error::github.event.repository.default_branch is empty; cannot validate release branch policy."
          exit 1
        fi

        if [[ "$REF_NAME" != "$DEFAULT_BRANCH" ]] && [[ ! "$REF_NAME" =~ ^dev(elop(ment)?)?$ ]]; then
          echo "::error::Release must be dispatched from '${DEFAULT_BRANCH}' or a develop branch (dev, develop, development). Current ref: ${REF_NAME}"
          exit 1
        fi
