name: Assert connector release advances
description: >-
  Ensures the GitVersion-based version has no existing GitHub release, is strictly greater than the
  highest existing v* release tag (using SemVer 2 ordering per spec §11), and writes version,
  tag, and max-version outputs. Requires GH_TOKEN for gh.

inputs:
  semver:
    description: "GitVersion SemVer output (with or without leading v)"
    required: true

outputs:
  version:
    description: "Normalized version without leading v"
    value: ${{ steps.assert.outputs.version }}
  tag:
    description: "Release tag v{version}"
    value: ${{ steps.assert.outputs.tag }}
  max-version:
    description: "Highest existing v* release version found (no v prefix), or empty"
    value: ${{ steps.assert.outputs.max-version }}

runs:
  using: composite
  steps:
    - name: Assert release advances
      id: assert
      shell: bash
      env:
        GITVERSION_SEMVER: ${{ inputs.semver }}
      run: |
        set -euo pipefail

        VERSION="${GITVERSION_SEMVER#v}"
        if [[ -z "$VERSION" ]]; then
          echo "::error::GitVersion did not produce a semantic version."
          exit 1
        fi

        # SemVer-ish filter for release tag bodies (after v); ordering uses SemVer 2 §11.
        semverish() {
          local s="$1"
          [[ "$s" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]
        }

        # Returns 0 (true) if $1 > $2 per SemVer 2 §11.
        # Pre-release has lower precedence than its associated release (§11.3).
        semver_gt() {
          local a="$1" b="$2"
          # Strip build metadata (§10)
          a="${a%%+*}"; b="${b%%+*}"
          # Split core and pre-release
          local a_core="${a%%-*}" a_pre="" b_core="${b%%-*}" b_pre=""
          [[ "$a" == *-* ]] && a_pre="${a#*-}"
          [[ "$b" == *-* ]] && b_pre="${b#*-}"

          # Compare numeric core segments (major.minor.patch)
          IFS='.' read -r a1 a2 a3 <<< "$a_core"
          IFS='.' read -r b1 b2 b3 <<< "$b_core"
          for pair in "$a1:$b1" "$a2:$b2" "$a3:$b3"; do
            local av="${pair%%:*}" bv="${pair##*:}"
            (( av > bv )) && return 0
            (( av < bv )) && return 1
          done

          # Cores equal: a release > pre-release (§11.3)
          [[ -z "$a_pre" && -n "$b_pre" ]] && return 0   # a is release, b is pre-release → a wins
          [[ -n "$a_pre" && -z "$b_pre" ]] && return 1   # a is pre-release, b is release → b wins
          [[ -z "$a_pre" && -z "$b_pre" ]] && return 1   # equal

          # Both have pre-release: compare dot-separated identifiers (§11.4)
          IFS='.' read -ra a_ids <<< "$a_pre"
          IFS='.' read -ra b_ids <<< "$b_pre"
          local i=0
          while true; do
            local a_has=$(( i < ${#a_ids[@]} ? 1 : 0 ))
            local b_has=$(( i < ${#b_ids[@]} ? 1 : 0 ))
            (( !a_has && !b_has )) && return 1  # equal
            (( !a_has )) && return 1            # fewer fields loses (§11.4.4)
            (( !b_has )) && return 0
            local ai="${a_ids[$i]}" bi="${b_ids[$i]}"
            if [[ "$ai" =~ ^[0-9]+$ && "$bi" =~ ^[0-9]+$ ]]; then
              (( ai > bi )) && return 0
              (( ai < bi )) && return 1
            else
              [[ "$ai" > "$bi" ]] && return 0
              [[ "$ai" < "$bi" ]] && return 1
            fi
            (( i++ ))
          done
        }

        gh_not_found_message() {
          echo "$1" | grep -qiE 'not found|release not found|404|unknown release|could not find|no release'
        }

        TAG="v${VERSION}"

        set +e
        view_out=$(gh release view "$TAG" 2>&1)
        view_ec=$?
        set -e
        if [[ "$view_ec" -eq 0 ]]; then
          echo "::error::Release ${TAG} already exists."
          exit 1
        fi
        if ! gh_not_found_message "$view_out"; then
          flat=$(echo "$view_out" | tr '\n' ' ')
          echo "::error::Could not verify that release '${TAG}' does not exist (gh exit ${view_ec}). Ensure GH_TOKEN has contents:read for this repository. Output: ${flat}"
          exit 1
        fi

        set +e
        list_out=$(gh release list --limit 1000 --json tagName --jq '.[].tagName' 2>&1)
        list_ec=$?
        set -e
        if [[ "$list_ec" -ne 0 ]]; then
          flat=$(echo "$list_out" | tr '\n' ' ')
          echo "::error::Failed to list GitHub releases (gh exit ${list_ec}). Ensure GH_TOKEN has contents:read. Output: ${flat}"
          exit 1
        fi

        MAX_VERSION=""
        while IFS= read -r RELEASE_TAG; do
          [[ -z "$RELEASE_TAG" ]] && continue
          [[ "$RELEASE_TAG" != v* ]] && continue
          RELEASE_VERSION=${RELEASE_TAG#v}
          semverish "$RELEASE_VERSION" || continue

          if [[ -z "$MAX_VERSION" ]]; then
            MAX_VERSION="$RELEASE_VERSION"
            continue
          fi

          semver_gt "$RELEASE_VERSION" "$MAX_VERSION" && MAX_VERSION="$RELEASE_VERSION"
        done <<< "$list_out"

        if [[ -n "$MAX_VERSION" ]]; then
          if ! semver_gt "$VERSION" "$MAX_VERSION"; then
            echo "::error::${VERSION} does not advance beyond highest existing release ${MAX_VERSION}."
            exit 1
          fi
        fi

        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "max-version=$MAX_VERSION" >> "$GITHUB_OUTPUT"
