name: Prepare Connector Logos
description: >-
  Validates and stages connector logos (single logo.svg or light/dark pair) from
  the iconography/ directory. Ensures logo files exist and light/dark pairs are complete.

inputs:
  iconography-dir:
    description: Path to iconography directory
    required: false
    default: iconography
  output-dir:
    description: Directory to stage logos into
    required: false
    default: dist-logos

runs:
  using: composite
  steps:
    - name: Prepare logos
      shell: bash
      env:
        ICONOGRAPHY_DIR: ${{ inputs.iconography-dir }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
      run: |
        set -euo pipefail

        HAS_SINGLE=false
        HAS_LIGHT=false
        HAS_DARK=false

        [[ -f "${ICONOGRAPHY_DIR}/logo.svg" ]]       && HAS_SINGLE=true || true
        [[ -f "${ICONOGRAPHY_DIR}/logo-light.svg" ]] && HAS_LIGHT=true  || true
        [[ -f "${ICONOGRAPHY_DIR}/logo-dark.svg" ]]  && HAS_DARK=true   || true

        if [[ "$HAS_LIGHT" == "true" && "$HAS_DARK" == "false" ]] || \
           [[ "$HAS_LIGHT" == "false" && "$HAS_DARK" == "true" ]]; then
          echo "::error::Incomplete light/dark logo pair: both ${ICONOGRAPHY_DIR}/logo-light.svg and ${ICONOGRAPHY_DIR}/logo-dark.svg must be present together."
          exit 1
        fi

        if [[ "$HAS_LIGHT" == "false" && "$HAS_SINGLE" == "false" ]]; then
          echo "::error::No logo found. Provide ${ICONOGRAPHY_DIR}/logo.svg for a single logo, or ${ICONOGRAPHY_DIR}/logo-light.svg + ${ICONOGRAPHY_DIR}/logo-dark.svg for a themed pair."
          exit 1
        fi

        mkdir -p "$OUTPUT_DIR"
        if [[ "$HAS_LIGHT" == "true" ]]; then
          cp "${ICONOGRAPHY_DIR}/logo-light.svg" "${OUTPUT_DIR}/logo-light.svg"
          cp "${ICONOGRAPHY_DIR}/logo-dark.svg"  "${OUTPUT_DIR}/logo-dark.svg"
        else
          cp "${ICONOGRAPHY_DIR}/logo.svg" "${OUTPUT_DIR}/logo.svg"
        fi
