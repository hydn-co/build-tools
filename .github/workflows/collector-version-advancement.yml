name: Collector Version Advancement

on:
  workflow_call:
    outputs:
      version:
        description: "Version computed from GitVersion"
        value: ${{ jobs.version-advancement.outputs.version }}
      tag:
        description: "Normalized release tag"
        value: ${{ jobs.version-advancement.outputs.tag }}
      max-version:
        description: "Highest existing semver release version"
        value: ${{ jobs.version-advancement.outputs.max-version }}
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version-advancement:
    name: Version Advancement
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      max-version: ${{ steps.version.outputs.max-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.4.2
        with:
          versionSpec: "6.7.x"

      - name: Calculate GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.4.2

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: "**/go.sum"
          check-latest: false

      - name: Download
        shell: bash
        run: go mod download

      - name: Check version advancement
        id: version
        shell: bash
        env:
          GITVERSION_SEMVER: ${{ steps.gitversion.outputs.semVer }}
        run: |
          set -euo pipefail

          curl -fsSL https://raw.githubusercontent.com/fsaintjacques/semver-tool/3.4.0/src/semver -o semver
          echo "1ff4a97e4d1e389f6f034f7464ac4365f1be2d900e2dc2121e24a6dc239e8991  semver" | shasum -a 256 -c -
          chmod +x semver

          VERSION="${GITVERSION_SEMVER#v}"
          if [[ -z "$VERSION" ]]; then
            echo "::error::GitVersion did not produce a semantic version."
            exit 1
          fi

          if ! ./semver validate "$VERSION" >/dev/null 2>&1; then
            echo "::error::GitVersion semver '$VERSION' is not valid semver."
            exit 1
          fi

          go run ./cmd/... -describe

          EXISTING_VERSION=$(jq -r 'if has("version") and .version != null then .version else "" end' manifest.json)
          if [[ -n "$EXISTING_VERSION" ]]; then
            echo "::error::manifest.json must not contain a source-owned version. Found '$EXISTING_VERSION'."
            exit 1
          fi

          tmp_manifest=$(mktemp)
          jq --arg version "$VERSION" '.version = $version' manifest.json > "$tmp_manifest"
          mv "$tmp_manifest" manifest.json

          INJECTED_VERSION=$(jq -r '.version' manifest.json)
          if [[ "$INJECTED_VERSION" != "$VERSION" ]]; then
            echo "::error::Injected manifest version '$INJECTED_VERSION' did not match GitVersion semver '$VERSION'."
            exit 1
          fi

          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists."
            exit 1
          fi

          MAX_VERSION=""
          while IFS= read -r RELEASE_TAG; do
            [[ -z "$RELEASE_TAG" ]] && continue
            [[ "$RELEASE_TAG" != v* ]] && continue

            RELEASE_VERSION=${RELEASE_TAG#v}
            if ! ./semver validate "$RELEASE_VERSION" >/dev/null 2>&1; then
              continue
            fi

            if [[ -z "$MAX_VERSION" ]]; then
              MAX_VERSION="$RELEASE_VERSION"
              continue
            fi

            COMPARE_RESULT=$(./semver compare "$RELEASE_VERSION" "$MAX_VERSION")
            if [[ "$COMPARE_RESULT" -gt 0 ]]; then
              MAX_VERSION="$RELEASE_VERSION"
            fi
          done <<EOF
          $(gh release list --limit 1000 --json tagName --jq '.[].tagName' 2>/dev/null || true)
          EOF

          if [[ -n "$MAX_VERSION" ]]; then
            COMPARE_RESULT=$(./semver compare "$VERSION" "$MAX_VERSION")
            if [[ "$COMPARE_RESULT" -le 0 ]]; then
              echo "::error::${VERSION} does not advance beyond highest existing release ${MAX_VERSION}."
              exit 1
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "max-version=$MAX_VERSION" >> "$GITHUB_OUTPUT"