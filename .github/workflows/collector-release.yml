name: Collector Release

on:
  workflow_call:
    outputs:
      version:
        description: "Version computed from GitVersion"
        value: ${{ jobs.validate.outputs.version }}
      tag:
        description: "Normalized release tag"
        value: ${{ jobs.validate.outputs.tag }}
      release-url:
        description: "URL of the GitHub release created by the workflow"
        value: ${{ jobs.publish.outputs.release-url }}
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Guard release branch
        shell: bash
        run: |
          set -euo pipefail
          REF_NAME="${{ github.ref_name }}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          if [[ "$REF_NAME" != "$DEFAULT_BRANCH" ]] && [[ ! "$REF_NAME" =~ ^dev(elop(ment)?)?$ ]]; then
            echo "::error::Release must be dispatched from '$DEFAULT_BRANCH' or a develop branch (dev, develop, development). Current ref: $REF_NAME"
            exit 1
          fi

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.4.2
        with:
          versionSpec: "6.7.x"

      - name: Calculate GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.4.2

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: "**/go.sum"
          check-latest: false

      - name: Download
        shell: bash
        run: go mod download

      - name: Prepare release manifest
        id: version
        shell: bash
        env:
          GITVERSION_SEMVER: ${{ steps.gitversion.outputs.semVer }}
        run: |
          set -euo pipefail

          curl -fsSL https://raw.githubusercontent.com/fsaintjacques/semver-tool/3.4.0/src/semver -o semver
          echo "1ff4a97e4d1e389f6f034f7464ac4365f1be2d900e2dc2121e24a6dc239e8991  semver" | shasum -a 256 -c -
          chmod +x semver

          VERSION="${GITVERSION_SEMVER#v}"
          if [[ -z "$VERSION" ]]; then
            echo "::error::GitVersion did not produce a semantic version."
            exit 1
          fi

          if ! ./semver validate "$VERSION" >/dev/null 2>&1; then
            echo "::error::GitVersion semver '$VERSION' is not valid semver."
            exit 1
          fi

          go run ./cmd/... -describe

          EXISTING_VERSION=$(jq -r 'if has("version") and .version != null then .version else "" end' manifest.json)
          if [[ -n "$EXISTING_VERSION" ]]; then
            echo "::error::manifest.json must not contain a source-owned version. Found '$EXISTING_VERSION'."
            exit 1
          fi

          tmp_manifest=$(mktemp)
          jq --arg version "$VERSION" '.version = $version' manifest.json > "$tmp_manifest"
          mv "$tmp_manifest" manifest.json

          INJECTED_VERSION=$(jq -r '.version' manifest.json)
          if [[ "$INJECTED_VERSION" != "$VERSION" ]]; then
            echo "::error::Injected manifest version '$INJECTED_VERSION' did not match GitVersion semver '$VERSION'."
            exit 1
          fi

          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists."
            exit 1
          fi

          MAX_VERSION=""
          while IFS= read -r RELEASE_TAG; do
            [[ -z "$RELEASE_TAG" ]] && continue
            [[ "$RELEASE_TAG" != v* ]] && continue

            RELEASE_VERSION=${RELEASE_TAG#v}
            if ! ./semver validate "$RELEASE_VERSION" >/dev/null 2>&1; then
              continue
            fi

            if [[ -z "$MAX_VERSION" ]]; then
              MAX_VERSION="$RELEASE_VERSION"
              continue
            fi

            COMPARE_RESULT=$(./semver compare "$RELEASE_VERSION" "$MAX_VERSION")
            if [[ "$COMPARE_RESULT" -gt 0 ]]; then
              MAX_VERSION="$RELEASE_VERSION"
            fi
          done <<EOF
          $(gh release list --limit 1000 --json tagName --jq '.[].tagName' 2>/dev/null || true)
          EOF

          if [[ -n "$MAX_VERSION" ]]; then
            COMPARE_RESULT=$(./semver compare "$VERSION" "$MAX_VERSION")
            if [[ "$COMPARE_RESULT" -le 0 ]]; then
              echo "::error::${VERSION} does not advance beyond highest existing release ${MAX_VERSION}."
              exit 1
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-manifest
          path: manifest.json

      - name: Prepare logos
        shell: bash
        run: |
          set -euo pipefail

          HAS_SINGLE=false
          HAS_LIGHT=false
          HAS_DARK=false

          [[ -f "iconography/logo.svg" ]]       && HAS_SINGLE=true || true
          [[ -f "iconography/logo-light.svg" ]] && HAS_LIGHT=true  || true
          [[ -f "iconography/logo-dark.svg" ]]  && HAS_DARK=true   || true

          if [[ "$HAS_LIGHT" == "true" && "$HAS_DARK" == "false" ]] || \
             [[ "$HAS_LIGHT" == "false" && "$HAS_DARK" == "true" ]]; then
            echo "::error::Incomplete light/dark logo pair: both iconography/logo-light.svg and iconography/logo-dark.svg must be present together."
            exit 1
          fi

          if [[ "$HAS_LIGHT" == "false" && "$HAS_SINGLE" == "false" ]]; then
            echo "::error::No logo found. Provide iconography/logo.svg for a single logo, or iconography/logo-light.svg + iconography/logo-dark.svg for a themed pair."
            exit 1
          fi

          mkdir -p dist-logos
          if [[ "$HAS_LIGHT" == "true" ]]; then
            cp iconography/logo-light.svg dist-logos/logo-light.svg
            cp iconography/logo-dark.svg  dist-logos/logo-dark.svg
          else
            cp iconography/logo.svg dist-logos/logo.svg
          fi

      - name: Upload logos artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-logos
          path: dist-logos/

  build:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: ppc64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: "**/go.sum"
          check-latest: false

      - name: Download
        shell: bash
        run: go mod download

      - name: Build binary
        id: binary
        shell: bash
        env:
          BINARY_PREFIX: ${{ github.event.repository.name }}-
          VERSION: ${{ needs.validate.outputs.version }}
          GOOS_VALUE: ${{ matrix.goos }}
          GOARCH_VALUE: ${{ matrix.goarch }}
        run: |
          set -euo pipefail

          FILENAME="${BINARY_PREFIX}${VERSION}-${GOOS_VALUE}-${GOARCH_VALUE}"
          if [[ "$GOOS_VALUE" == "windows" ]]; then
            FILENAME="${FILENAME}.exe"
          fi

          OUTPUT_PATH="$GITHUB_WORKSPACE/$FILENAME"
          GOOS="$GOOS_VALUE" GOARCH="$GOARCH_VALUE" CGO_ENABLED="0" \
            go build -o "$OUTPUT_PATH" ./cmd

          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "path=$OUTPUT_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ needs.validate.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.binary.outputs.path }}

  publish:
    name: Publish
    needs: [validate, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      release-url: ${{ steps.release.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate per-file checksums
        shell: bash
        env:
          ASSET_PREFIX: ${{ github.event.repository.name }}-${{ needs.validate.outputs.version }}-
        run: |
          set -euo pipefail
          shopt -s nullglob

          cd dist

          COUNT=0
          for file in ${ASSET_PREFIX}*; do
            [[ -f "$file" ]] || continue
            sha256sum "$file" > "${file}.sha256"
            COUNT=$((COUNT + 1))
          done

          if [[ "$COUNT" -eq 0 ]]; then
            echo "::error::No release assets matched '${ASSET_PREFIX}*' in dist/."
            exit 1
          fi

      - name: Guard against duplicate release
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.validate.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release ${TAG} already exists. Aborting."
            exit 1
          fi

      - name: Create release
        id: release
        shell: bash
        env:
          TAG: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          gh release create "$TAG" \
            --title "$RELEASE_NAME $VERSION" \
            --generate-notes \
            dist/*

          URL=$(gh release view "$TAG" --json url --jq '.url')
          echo "url=$URL" >> "$GITHUB_OUTPUT"