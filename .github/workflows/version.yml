name: Version

on:
  workflow_call:
    outputs:
      version:
        description: "The calculated semantic version"
        value: ${{ jobs.version.outputs.version }}
      semver:
        description: "The semantic version"
        value: ${{ jobs.version.outputs.semVer }}
      majorMinorPatch:
        description: "Major.Minor.Patch version"
        value: ${{ jobs.version.outputs.majorMinorPatch }}
      sha:
        description: "The commit SHA"
        value: ${{ jobs.version.outputs.sha }}
      fullSemVer:
        description: "Full semantic version including pre-release and metadata"
        value: ${{ jobs.version.outputs.fullSemVer }}
      informationalVersion:
        description: "Informational version string"
        value: ${{ jobs.version.outputs.informationalVersion }}
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.semVer }}
      semVer: ${{ steps.version.outputs.semVer }}
      majorMinorPatch: ${{ steps.version.outputs.majorMinorPatch }}
      sha: ${{ steps.version.outputs.sha }}
      fullSemVer: ${{ steps.version.outputs.fullSemVer }}
      informationalVersion: ${{ steps.version.outputs.informationalVersion }}

    steps:
      - name: Checkout Full History
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: "6.7.x"

      - name: Calculate Version
        id: version
        uses: gittools/actions/gitversion/execute@v4.5.0
